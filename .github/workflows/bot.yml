name: STIPS Bot

on:

  workflow_dispatch:

  schedule:
    - cron: "0 6 * * *"


jobs:

  run:

    runs-on: ubuntu-latest


    steps:

    - name: Download code
      uses: actions/checkout@v4


    - name: Python setup
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"


    - name: Install packages
      run: |
        pip install -r requirements.txt


    - name: Run bot
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}

      run: |
        python main.py
